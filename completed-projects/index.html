---
layout: default
title: Completed Projects
---

<h1>Completed Projects</h1>

<ul>
  {% assign items = site.completed_projects | sort: "date" | reverse %}
  {% for p in items %}
    <li>
      <a href="{{ p.url }}">{{ p.title }}</a>
      <small>{{ p.date | date: "%Y-%m-%d" }}</small>
      {% if p.summary %}<div>{{ p.summary }}</div>{% endif %}
    </li>
  {% endfor %}
</ul>
